<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Live - Deli Daily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; overflow: hidden; }
        .progress-bar-glow {
            box-shadow: 0 0 20px rgba(18, 207, 53, 0.5);
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .smart-active-glow {
            animation: pulse-soft 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-sm w-full text-center">
        <div id="icon-container" class="mb-8 opacity-0 transition-all duration-1000 transform scale-50">
            <div class="w-24 h-24 bg-[#12cf35] rounded-full mx-auto flex items-center justify-center shadow-2xl shadow-green-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
        </div>

        <h1 id="headline" class="text-2xl font-bold text-[#0b47af] mb-2 opacity-0 translate-y-4 transition-all duration-700">
            การติดตั้งเสร็จสมบูรณ์!
        </h1>
        <p id="sub-headline" class="text-gray-500 text-sm mb-12 opacity-0 translate-y-4 transition-all duration-700 delay-300">
            กำลังประมวลผลวิสัยทัศน์ของคุณ...
        </p>

        <div class="relative pt-1">
            <div class="flex mb-2 items-center justify-between">
                <div>
                    <span id="status-tag" class="text-[10px] font-semibold inline-block py-1 px-2 uppercase rounded-full text-[#0b47af] bg-blue-50 transition-colors duration-500">
                        System Setup
                    </span>
                </div>
                <div class="text-right">
                    <span id="progress-text" class="text-xs font-bold text-[#0b47af]">
                        0%
                    </span>
                </div>
            </div>
            <div class="overflow-hidden h-3 mb-4 text-xs flex rounded-full bg-gray-200 shadow-inner">
                <div id="progress-bar" style="width: 0%" class="progress-bar-glow shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-[#12cf35] transition-all duration-700 ease-out"></div>
            </div>
        </div>

        <div id="smart-insight" class="mt-12 bg-white p-6 rounded-3xl border border-gray-100 shadow-sm opacity-0 transition-all duration-1000">
            <p class="text-[#0788e4] text-sm leading-relaxed italic">
                "ยินดีด้วยครับพี่นก ตั้งแต่วินาทีนี้ไป... <br>
                <span class="font-bold text-lg not-italic text-[#0b47af]">วิสัยทัศน์ของพี่จะคมชัดขึ้น</span><br>
                ด้วยพลังของ Data จาก Deli Daily"
            </p>
        </div>

        <button id="btn-final" class="mt-10 w-full bg-[#0b47af] text-white font-bold py-4 rounded-2xl opacity-0 transition-all duration-500 hover:bg-[#0788e4] transform active:scale-95">
            เข้าสู่ Dashboard แรกของคุณ
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const statusTag = document.getElementById('status-tag');
            const headline = document.getElementById('headline');
            const subHeadline = document.getElementById('sub-headline');
            const iconContainer = document.getElementById('icon-container');
            const smartInsight = document.getElementById('smart-insight');
            const btnFinal = document.getElementById('btn-final');

            // --- ANIMATION STEPS ---
            
            // Step 1: วิ่งไปที่ 75% (Recap Gate)
            setTimeout(() => {
                progressBar.style.width = '75%';
                updateProgress(0, 75, 1500);
                headline.style.opacity = '1';
                headline.style.transform = 'translateY(0)';
                iconContainer.style.opacity = '1';
                iconContainer.style.transform = 'scale(1)';
            }, 500);

            // Step 2: ค้างไว้แป๊บ แล้ววิ่งทะลุ 100%
            setTimeout(() => {
                progressBar.style.width = '100%';
                updateProgress(75, 100, 1000);
                statusTag.innerText = 'Smart Data Live';
                statusTag.classList.replace('text-[#0b47af]', 'text-white');
                statusTag.classList.replace('bg-blue-50', 'bg-[#12cf35]');
                
                // ฉลอง!
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#12cf35', '#0b47af', '#0788e4']
                });
            }, 2500);

            // Step 3: พ่น Message ร่างทอง
            setTimeout(() => {
                subHeadline.innerText = 'วิสัยทัศน์ของคุณ... พร้อมทำงานแล้ว';
                subHeadline.style.opacity = '1';
                subHeadline.style.transform = 'translateY(0)';
                smartInsight.style.opacity = '1';
                smartInsight.classList.add('smart-active-glow');
                btnFinal.style.opacity = '1';
            }, 3500);

            function updateProgress(start, end, duration) {
                let current = start;
                const range = end - start;
                const increment = end > start ? 1 : -1;
                const stepTime = Math.abs(Math.floor(duration / range));
                
                const timer = setInterval(() => {
                    current += increment;
                    progressText.innerText = current + '%';
                    if (current == end) clearInterval(timer);
                }, stepTime);
            }
        });
    </script>
</body>
</html>
