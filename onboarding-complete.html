<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Integration - Deli Daily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f4f8; overflow: hidden; }
        
        /* Isometric Container */
        .iso-grid {
            transform: rotateX(45deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            width: 200px; height: 200px;
        }

        /* 3D Cube Styling */
        .cube {
            position: absolute; width: 40px; height: 40px;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateZ(-100px);
        }
        .cube .face {
            position: absolute; width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .face.top    { transform: translateZ(40px); background: #12cf35; }
        .face.front  { transform: rotateX(-90deg) translateZ(20px) translateY(20px); background: #0fad2c; }
        .face.right  { transform: rotateY(90deg) translateZ(20px) translateX(20px); background: #0b47af; }

        /* การจัดวาง 4 เสา */
        .pos-1 { top: 0; left: 0; }
        .pos-2 { top: 0; left: 80px; }
        .pos-3 { top: 80px; left: 0; }
        .pos-4 { top: 80px; left: 80px; }

        /* Animation ส่องสว่าง */
        .active-cube { opacity: 1; transform: translateZ(0); }
        .active-cube .face.top { box-shadow: 0 0 30px rgba(18, 207, 53, 0.8); }

        /* เส้นเชื่อม (Pipes) */
        .pipe {
            position: absolute; background: #cbd5e1;
            transition: all 0.5s ease; opacity: 0;
        }
        .pipe-h { height: 2px; width: 0; top: 20px; }
        .pipe-v { width: 2px; height: 0; left: 20px; }
        .pipe-active { opacity: 1; width: 40px; height: 40px; } /* ขยายความยาวตามจริง */
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">

    <div class="mb-24">
        <div class="iso-grid relative">
            <div id="cube1" class="cube pos-1"><div class="face top"></div><div class="face front"></div><div class="face right"></div></div>
            <div id="cube2" class="cube pos-2"><div class="face top"></div><div class="face front"></div><div class="face right"></div></div>
            <div id="cube3" class="cube pos-3"><div class="face top"></div><div class="face front"></div><div class="face right"></div></div>
            <div id="cube4" class="cube pos-4 text-white flex items-center justify-center font-bold">
                <div class="face top flex items-center justify-center text-[10px]">100%</div>
                <div class="face front"></div><div class="face right"></div>
            </div>
        </div>
    </div>

    <div class="text-center px-8">
        <h2 id="msg-main" class="text-xl font-semibold text-slate-800 mb-2">กำลังเตรียมโครงสร้าง...</h2>
        <p id="msg-sub" class="text-slate-500 text-sm">สร้างฐานข้อมูล Mother Ship</p>
        
        <div class="mt-8 flex justify-center gap-2">
            <div id="dot1" class="w-2 h-2 rounded-full bg-slate-300"></div>
            <div id="dot2" class="w-2 h-2 rounded-full bg-slate-300"></div>
            <div id="dot3" class="w-2 h-2 rounded-full bg-slate-300"></div>
            <div id="dot4" class="w-2 h-2 rounded-full bg-slate-300"></div>
        </div>
    </div>

    <script>
        const steps = [
            { id: 'cube1', dot: 'dot1', main: 'Mother Ship Ready', sub: 'ฐานรากเชื่อมต่อสมบูรณ์' },
            { id: 'cube2', dot: 'dot2', main: 'Data Pipeline Active', sub: 'ระบบรับออเดอร์จากแอปฯ พร้อม' },
            { id: 'cube3', dot: 'dot3', main: 'Staff Identity Linked', sub: 'ยืนยันตัวตนพนักงานหน้างานแล้ว' },
            { id: 'cube4', dot: 'dot4', main: 'System Live!', sub: 'วิสัยทัศน์ของพี่นก... คมชัดขึ้นแล้ว' }
        ];

        let currentStep = 0;

        function runOnboarding() {
            if (currentStep < steps.length) {
                const s = steps[currentStep];
                document.getElementById(s.id).classList.add('active-cube');
                document.getElementById(s.dot).classList.replace('bg-slate-300', 'bg-[#12cf35]');
                document.getElementById('msg-main').innerText = s.main;
                document.getElementById('msg-sub').innerText = s.sub;
                
                currentStep++;
                setTimeout(runOnboarding, 1200);
            } else {
                // จบงาน
                document.getElementById('msg-main').classList.add('text-[#12cf35]');
                alert("ยินดีด้วยครับ! ระบบติดตั้งสมบูรณ์");
            }
        }

        setTimeout(runOnboarding, 1000);
    </script>
</body>
</html>
