<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Integration - Deli Daily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .progress-container { background: #e2e8f0; border-radius: 999px; overflow: hidden; height: 6px; }
        .progress-fill { width: 0%; height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .bg-brand { background-color: #0b47af; }
        .bg-active { background-color: #12cf35; }
        .glow-active { box-shadow: 0 0 15px rgba(18, 207, 53, 0.4); }
        
        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .float-info { animation: subtle-float 3s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-center">

    <div class="max-w-md w-full">
        <div class="mb-10">
            <h1 id="main-status" class="text-2xl font-bold text-slate-800 mb-2 transition-colors duration-500">ผสานโครงสร้างดิจิทัล...</h1>
            <p class="text-slate-400 text-sm">กรุณารอสักครู่ ระบบกำลังสร้างความเชื่อมโยง</p>
        </div>

        <div class="space-y-5 mb-12">
            <div class="w-1/2 mx-auto">
                <div class="flex justify-between mb-1.5 text-[9px] font-bold text-slate-400 uppercase tracking-widest">
                    <span>The Core</span>
                    <span id="p1-val">0%</span>
                </div>
                <div class="progress-container"><div id="p1-bar" class="progress-fill bg-brand"></div></div>
            </div>
            <div class="w-1/2 mx-auto">
                <div class="flex justify-between mb-1.5 text-[9px] font-bold text-slate-400 uppercase tracking-widest">
                    <span>The Data Pipe</span>
                    <span id="p2-val">0%</span>
                </div>
                <div class="progress-container"><div id="p2-bar" class="progress-fill bg-brand"></div></div>
            </div>
            <div class="w-1/2 mx-auto">
                <div class="flex justify-between mb-1.5 text-[9px] font-bold text-slate-400 uppercase tracking-widest">
                    <span>The People</span>
                    <span id="p3-val">0%</span>
                </div>
                <div class="progress-container"><div id="p3-bar" class="progress-fill bg-brand"></div></div>
            </div>
            <div class="w-1/2 mx-auto">
                <div class="flex justify-between mb-1.5 text-[9px] font-bold text-slate-400 uppercase tracking-widest">
                    <span>The Brain</span>
                    <span id="p4-val">0%</span>
                </div>
                <div class="progress-container"><div id="p4-bar" class="progress-fill bg-brand"></div></div>
            </div>
        </div>

        <div class="pt-8 border-t border-slate-100 mb-10">
            <div class="flex justify-between mb-3 items-end">
                <div class="text-left">
                    <span class="block text-[10px] text-blue-500 font-bold uppercase tracking-tighter">Master Integration</span>
                    <h3 class="text-lg font-bold text-slate-800">การอัพเกรดร้านทั้งระบบ</h3>
                </div>
                <span id="total-val" class="text-3xl font-bold text-[#12cf35]">0%</span>
            </div>
            <div class="progress-container h-3 shadow-inner">
                <div id="total-bar" class="progress-fill bg-active glow-active"></div>
            </div>
        </div>

        <div id="final-gate" class="opacity-0 transition-all duration-1000 transform translate-y-10">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-blue-50 float-info mb-8">
                <p class="text-slate-600 leading-relaxed text-sm">
                    "ตั้งแต่วินาทีนี้ไป... <br>
                    <span class="text-lg font-bold text-[#0b47af]">วิสัยทัศน์ของพี่จะถูกขับเคลื่อนด้วยความจริง</span><br>
                    Deli Daily พร้อมรีดทุกเม็ดกำไรให้พี่แล้วครับ"
                </p>
            </div>
            
            <div class="flex justify-center">
                <button id="btn-dashboard" class="w-1/2 bg-[#0b47af] text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-[#0788e4] transition-all transform active:scale-95 text-sm">
                    เปิด Dashboard แรก
                </button>
            </div>
        </div>
    </div>

    <script>
        const bars = ['p1', 'p2', 'p3', 'p4'];
        const totalBar = document.getElementById('total-bar');
        const totalVal = document.getElementById('total-val');
        const mainStatus = document.getElementById('main-status');
        const finalGate = document.getElementById('final-gate');

        function runIntegration() {
            bars.forEach((id, index) => {
                setTimeout(() => {
                    const el = document.getElementById(id + '-bar');
                    const valEl = document.getElementById(id + '-val');
                    el.style.width = '100%';
                    animateValue(valEl, 0, 100, 1200 + (index * 200));
                    updateMasterProgress(index);
                }, index * 400);
            });
        }

        function updateMasterProgress(index) {
            const progressSteps = [25, 50, 75, 100];
            setTimeout(() => {
                const target = progressSteps[index];
                totalBar.style.width = target + '%';
                animateValue(totalVal, (index === 0 ? 0 : progressSteps[index-1]), target, 800);
                if (target === 100) finishSystem();
            }, 800 + (index * 400));
        }

        function finishSystem() {
            setTimeout(() => {
                mainStatus.innerText = "ระบบทำงานเต็มรูปแบบ";
                mainStatus.classList.add('text-[#12cf35]');
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.75 },
                    colors: ['#12cf35', '#0b47af', '#0788e4']
                });
                finalGate.classList.replace('opacity-0', 'opacity-100');
                finalGate.classList.replace('translate-y-10', 'translate-y-0');
            }, 800);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + "%";
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.onload = () => setTimeout(runIntegration, 500);
    </script>
</body>
</html>
