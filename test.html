<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Deli Daily - Closing Auditor</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>

        body { font-family: sans-serif; padding: 15px; background-color: #1a1a1a; color: #fff; }

        .card { background: #2d2d2d; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; text-align: center; }

        .info-box { background: #3d3d3d; padding: 15px; border-radius: 12px; margin: 15px 0; text-align: left; font-size: 14px; }

        .badge { background: #00b900; color: #000; padding: 2px 8px; border-radius: 5px; font-weight: bold; }

        #formArea { display: none; }

        input { width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; font-size: 18px; box-sizing: border-box; }

        button { background: #00b900; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; }

        #debugLog { background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; margin-top: 20px; text-align: left; border-radius: 5px; display: block; white-space: pre-wrap; }

    </style>

</head>

<body>

    <div class="card">

        <h2 id="displayName">Loading...</h2>

        <div class="info-box">

            <p>Role: <span id="displayRole" class="badge">Checking...</span></p>

            <p>Shop: <b id="displayShopName">...</b></p>

            <p>UID: <small id="userId">...</small></p>

        </div>



        <div id="formArea">

            <p style="color:#00b900">✅ เข้าใช้งานสำเร็จ</p>

            <input type="number" id="shopTransfer" placeholder="เงินโอน">

            <input type="number" id="shopCash" placeholder="เงินสด">

            <button onclick="sendData()">ยืนยันปิดยอด</button>

        </div>



        <div id="debugLog">Debug: Waiting for data...</div>

    </div>



    <script>

        const MY_LIFF_ID = "2010194217-lnwYLoTq"; 

        const MY_N8N_URL = "https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B";



        async function main() {

            await liff.init({ liffId: MY_LIFF_ID });

            if (!liff.isLoggedIn()) { liff.login(); return; }

            const profile = await liff.getProfile();

            document.getElementById("displayName").innerText = profile.displayName;

            document.getElementById("userId").innerText = profile.userId;

            

            checkPermission(profile.userId);

        }



        async function checkPermission(uid) {

            const log = document.getElementById("debugLog");

            try {

                const res = await fetch(MY_N8N_URL, {

                    method: "POST",

                    headers: { "Content-Type": "application/json" },

                    body: JSON.stringify({ action: "CHECK_PERMISSION", userId: uid })

                });

                

                const data = await res.json();

                log.innerText = "Raw Data from n8n: " + JSON.stringify(data, null, 2);



                // --- 🛠️ Logic "ดัดหลัง" n8n (มาแบบไหนก็ต้องอ่านได้) ---

                const raw = Array.isArray(data) ? data[0] : data;

                // เช็คทั้งตัวเล็กตัวใหญ่

                const role = raw.Role || raw.role || "Unknown";

                const branch = raw.Branch || raw.branch || "Unknown";



                document.getElementById("displayRole").innerText = role;

                document.getElementById("displayShopName").innerText = branch;



                if (role.toLowerCase() === "cashier") {

                    document.getElementById("formArea").style.display = "block";

                } else {

                    log.innerText += "\n\n❌ สิทธิ์ไม่ผ่าน: ระบบต้องการ 'Cashier' แต่ได้รับ '" + role + "'";

                }



            } catch (err) {

                log.innerText = "Network Error: " + err.message;

            }

        }



        async function sendData() {

            alert("กำลังส่งข้อมูล...");

            // ฟังก์ชันส่งข้อมูลเดิม...

        }



        main();

    </script>

</body>

</html>
