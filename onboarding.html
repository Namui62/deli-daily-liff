<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deli Daily - Owner Onboarding</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #F8F9FA; } /* Light Canvas */
        .onyx-board { background-color: #121212; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glow-cobalt { box-shadow: 0 0 15px rgba(11, 71, 175, 0.4); }
        .success-glow { box-shadow: 0 0 20px rgba(18, 207, 53, 0.6); }
        .input-field { background-color: #1E1E1E; border: 1px solid #2A2A2A; color: white; transition: all 0.3s; }
        .input-field:focus { border-color: #0B47AF; outline: none; box-shadow: 0 0 8px rgba(11, 71, 175, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="onyx-board p-8 text-white relative overflow-hidden">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-[#0B47AF] rounded-2xl mx-auto mb-4 flex items-center justify-center glow-cobalt">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h1 class="text-xl font-semibold tracking-tight">DELI DAILY <span class="text-[#0B47AF]">OS</span></h1>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Enterprise Setup</p>
            </div>

            <div class="mb-10">
                <div class="flex justify-between text-[10px] text-gray-500 mb-2 uppercase font-medium">
                    <span id="stepIndicator">Step 1 of 5</span>
                    <span id="percentIndicator">20%</span>
                </div>
                <div class="w-full bg-[#2A2A2A] h-1 rounded-full">
                    <div id="progressBar" class="bg-[#0B47AF] h-1 rounded-full transition-all duration-500" style="width: 20%"></div>
                </div>
            </div>

            <form id="onboardingForm">
                <div id="step1" class="step-content active">
                    <label class="block text-sm font-medium text-gray-300 mb-2">ชื่อร้านค้า (Store Name)</label>
                    <input type="text" id="storeName" class="input-field w-full p-4 rounded-xl" placeholder="เช่น Baan Ya Steak House">
                </div>

                <div id="step2" class="step-content">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Spreadsheet ID</label>
                    <input type="text" id="sheetId" class="input-field w-full p-4 rounded-xl text-xs font-mono" placeholder="คัดลอกจาก URL ของ Google Sheets">
                </div>

                <div id="step3" class="step-content">
                    <label class="block text-sm font-medium text-gray-300 mb-2">ข้อมูลความปลอดภัย (Auto)</label>
                    <div class="bg-[#1E1E1E] p-4 rounded-xl border border-graphite text-[11px] font-mono break-all opacity-70">
                        <p class="text-[#0B47AF]">USER_ID:</p>
                        <p id="dispUserId" class="mb-2">Loading...</p>
                        <p class="text-[#0B47AF]">ROOM_ID:</p>
                        <p id="dispRoomId">Loading...</p>
                    </div>
                </div>

                <div id="step4" class="step-content text-center">
                    <label class="block text-sm font-medium text-gray-300 mb-4 text-left">ตำแหน่งที่ตั้ง Safe Zone</label>
                    <button type="button" onclick="getLocation()" id="gpsBtn" class="w-full py-4 border-2 border-dashed border-[#0B47AF] text-[#0B47AF] rounded-2xl font-medium transition-all hover:bg-[#0B47AF]/10">
                        📍 ปักหมุดพิกัดร้านปัจจุบัน
                    </button>
                    <p id="geoStatus" class="mt-3 text-xs text-gray-500 italic">ต้องระบุพิกัดเพื่อความแม่นยำของระบบ Audit</p>
                </div>

                <div id="step5" class="step-content text-center">
                    <div class="bg-[#1E1E1E] p-6 rounded-2xl border border-graphite mb-6">
                        <svg class="w-12 h-12 text-[#12CF35] mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-sm text-gray-300">ยืนยันการเชื่อมต่อยานแม่</p>
                    </div>
                    <button type="button" onclick="submitData()" id="submitBtn" class="w-full py-4 bg-[#0B47AF] text-white rounded-xl font-semibold glow-cobalt">ส่งข้อมูลขึ้นระบบ</button>
                </div>

                <div class="mt-10 flex justify-between gap-4">
                    <button type="button" id="prevBtn" onclick="changeStep(-1)" class="flex-1 py-3 text-sm text-gray-500 font-medium hidden">ย้อนกลับ</button>
                    <button type="button" id="nextBtn" onclick="changeStep(1)" class="flex-1 py-3 bg-[#0B47AF] text-white rounded-xl font-medium">ถัดไป</button>
                </div>
            </form>
        </div>
        <p class="text-center text-gray-400 text-[10px] mt-6 tracking-[0.2em] uppercase">Powered by Deli Daily Automation</p>
    </div>

    <div id="successOverlay" class="fixed inset-0 bg-white z-50 hidden flex flex-col items-center justify-center">
        <div class="w-24 h-24 bg-[#12CF35] rounded-full flex items-center justify-center success-glow animate-bounce">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-[#12CF35] text-2xl font-bold mt-6">SUCCESS</h2>
    </div>

    <script>
        let currentStep = 1;
        let payload = { userId: '', groupId: '', lat: null, lng: null };
        const WEBHOOK_URL = 'https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B';

        async function initLiff() {
            try {
                await liff.init({ liffId: "2010194217-lnwYLoTq" });
                if (!liff.isLoggedIn()) liff.login();
                const profile = await liff.getProfile();
                const context = liff.getContext();
                payload.userId = profile.userId;
                payload.groupId = context.groupId || 'PRIVATE';
                document.getElementById('dispUserId').innerText = payload.userId;
                document.getElementById('dispRoomId').innerText = payload.groupId;
            } catch (e) { console.error(e); }
        }

        function changeStep(n) {
            document.getElementById(`step${currentStep}`).classList.remove('active');
            currentStep += n;
            document.getElementById(`step${currentStep}`).classList.add('active');
            
            const progress = (currentStep / 5) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('stepIndicator').innerText = `Step ${currentStep} of 5`;
            document.getElementById('percentIndicator').innerText = progress + '%';
            
            document.getElementById('prevBtn').classList.toggle('hidden', currentStep === 1);
            document.getElementById('nextBtn').classList.toggle('hidden', currentStep === 5);
        }

        function getLocation() {
            const btn = document.getElementById('gpsBtn');
            navigator.geolocation.getCurrentPosition((pos) => {
                payload.lat = pos.coords.latitude;
                payload.lng = pos.coords.longitude;
                btn.innerText = '✅ พิกัดถูกล็อกแล้ว';
                btn.classList.replace('text-[#0B47AF]', 'text-[#12CF35]');
                btn.style.borderColor = '#12CF35';
                document.getElementById('geoStatus').innerText = `Lat: ${payload.lat.toFixed(4)}, Lng: ${payload.lng.toFixed(4)}`;
            }, (err) => alert('โปรดเปิดสิทธิ์ GPS'));
        }

        async function submitData() {
            const finalData = {
                ...payload,
                storeName: document.getElementById('storeName').value,
                sheetId: document.getElementById('sheetId').value
            };
            
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalData)
                });
                if (res.ok) {
                    document.getElementById('successOverlay').classList.remove('hidden');
                    setTimeout(() => liff.closeWindow(), 1500);
                }
            } catch (e) { alert('Network Error'); }
        }

        initLiff();
    </script>
</body>
</html>
