<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deli Daily - Owner Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .bg-brand-gradient {
            background: radial-gradient(circle at top right, #0788e4 0%, #0b47af 100%);
        }
        .btn-green {
            background-color: #12cf35;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-green:hover {
            background-color: #0fad2c;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(18, 207, 53, 0.3);
        }
        .input-focus:focus {
            border-color: #0788e4;
            box-shadow: 0 0 0 4px rgba(7, 136, 228, 0.1);
        }
        /* ปรับจังหวะพื้นหลังเล็กน้อย */
        .card-overlap {
            margin-top: -60px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="bg-brand-gradient pt-16 pb-32 px-6 text-center text-white relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mr-20 -mt-20"></div>
        <div class="absolute bottom-0 left-0 w-40 h-40 bg-white opacity-5 rounded-full -ml-10 -mb-10"></div>
        
        <div class="relative z-10">
            <h1 class="text-3xl font-bold tracking-tight mb-2">Deli Daily</h1>
            <p class="text-blue-100 text-sm opacity-90 font-light">ระบบอัตโนมัติสำหรับร้านอาหารยุคใหม่</p>
        </div>
    </div>

    <div class="max-w-md mx-auto card-overlap px-4 pb-12 relative z-20">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
            <div class="p-8">
                <form id="onboardingForm" class="space-y-6">
                    
                    <div class="space-y-4">
                        <div class="flex items-center space-x-2 mb-4">
                            <div class="w-1.5 h-6 bg-[#0b47af] rounded-full"></div>
                            <h2 class="text-gray-900 font-semibold text-lg">ลงทะเบียนเจ้าของร้าน</h2>
                        </div>
                        
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5 ml-1 tracking-wider">ชื่อร้านอาหาร</label>
                            <input type="text" id="storeName" required value="The Pizza Runner" 
                                class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-gray-700 outline-none input-focus transition-all font-medium">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5 ml-1 tracking-wider">ชื่อเจ้าของร้าน</label>
                            <input type="text" id="ownerName" required placeholder="ระบุชื่อเพื่อใช้เรียกในระบบ" 
                                class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-gray-700 outline-none input-focus transition-all font-medium">
                        </div>
                    </div>

                    <div class="space-y-4 pt-6 border-t border-gray-100">
                        <div class="flex items-center space-x-2 mb-4">
                            <div class="w-1.5 h-6 bg-[#12cf35] rounded-full"></div>
                            <h2 class="text-gray-900 font-semibold text-lg">Platform & GP Settings</h2>
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1.5 ml-1 tracking-wider">อีเมลรับรายงานเดลิเวอรี</label>
                            <input type="email" id="reportEmail" required placeholder="owner@email.com" 
                                class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-gray-700 outline-none input-focus transition-all font-medium">
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 text-center">
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Grab</label>
                                <div class="flex items-center justify-center">
                                    <input type="number" id="gpGrab" value="30" class="w-full bg-transparent text-center font-bold text-[#0b47af] text-xl outline-none">
                                    <span class="text-[10px] text-[#0b47af] font-bold">%</span>
                                </div>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 text-center">
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Lineman</label>
                                <div class="flex items-center justify-center">
                                    <input type="number" id="gpLM" value="30" class="w-full bg-transparent text-center font-bold text-[#0b47af] text-xl outline-none">
                                    <span class="text-[10px] text-[#0b47af] font-bold">%</span>
                                </div>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 text-center">
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Shopee</label>
                                <div class="flex items-center justify-center">
                                    <input type="number" id="gpShopee" value="30" class="w-full bg-transparent text-center font-bold text-[#0b47af] text-xl outline-none">
                                    <span class="text-[10px] text-[#0b47af] font-bold">%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6">
                        <button type="submit" id="btnSubmit" 
                            class="btn-green w-full text-white font-bold py-5 rounded-[1.25rem] shadow-xl flex items-center justify-center space-x-3 text-lg">
                            <span>เริ่มสร้างระบบ Deli Daily</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="text-center mt-10">
            <p class="text-gray-400 text-[10px] uppercase tracking-[0.2em]">Powered by Deli Daily Automation</p>
        </div>
    </div>

    <script>
        const N8N_WEBHOOK_URL = 'https://n8n.yourdomain.com/webhook/onboarding-owner';

        async function main() {
            await liff.init({ liffId: "ใส่_LIFF_ID_ของพี่ตรงนี้" });
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }
        main();

        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = `<span>กำลังสร้างระบบ...</span>`;

            const profile = await liff.getProfile();
            
            const formData = {
                ownerLineId: profile.userId,
                storeName: document.getElementById('storeName').value,
                ownerName: document.getElementById('ownerName').value,
                reportEmail: document.getElementById('reportEmail').value,
                gpGrab: document.getElementById('gpGrab').value,
                gpLM: document.getElementById('gpLM').value,
                gpShopee: document.getElementById('gpShopee').value,
                createdDate: new Date().toISOString()
            };

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('สำเร็จ! ระบบกำลังดำเนินการโคลนไฟล์ให้คุณ');
                    liff.closeWindow();
                } else {
                    throw new Error('Error');
                }
            } catch (error) {
                alert('การเชื่อมต่อขัดข้อง');
                btn.disabled = false;
                btn.innerText = 'เริ่มสร้างระบบ Deli Daily';
            }
        });
    </script>
</body>
</html>
