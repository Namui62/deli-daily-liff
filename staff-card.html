<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAFF CARD | Deli Daily OS</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #F4F6F8; }
        .graphite-card { background-color: #2A2A2A; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .cobalt-ring { border: 3px solid #0B47AF; box-shadow: 0 0 15px rgba(11, 71, 175, 0.5); }
        .input-dark { background-color: #1E1E1E; border: 1px solid #3A3A3A; color: white; }
        .input-dark:focus { border-color: #0B47AF; outline: none; }
        .state-panel { display: none; }
        .state-panel.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #successOverlay { background-color: #12CF35; display: none; z-index: 100; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6">

    <div class="w-full text-left mb-6 px-2">
        <p class="text-[10px] tracking-[0.1em] text-gray-400 uppercase leading-none">Deli Daily</p>
        <h1 id="headerTitle" class="text-3xl font-bold text-[#0B47AF] leading-none mt-1 uppercase">STAFF CARD</h1>
    </div>

    <div class="flex-grow flex items-center justify-center">
        <div class="graphite-card w-full max-w-md p-8 flex flex-col items-center relative overflow-hidden">
            
            <div id="profileSection" class="flex flex-col items-center mb-6 hidden">
                <div class="relative mb-3">
                    <img id="userImg" src="" class="w-24 h-24 rounded-full cobalt-ring object-cover p-1">
                    <div id="gpsStatus" class="absolute -bottom-1 -right-1 bg-gray-500 w-6 h-6 rounded-full border-4 border-[#2A2A2A]"></div>
                </div>
                <h2 id="userName" class="text-white text-xl font-medium mb-0.5">-</h2>
                <p id="userRole" class="text-[#B0B0B0] text-[9px] font-light uppercase tracking-[0.2em]">Authenticating...</p>
            </div>

            <div id="panel-unregistered" class="state-panel w-full">
                <h3 class="text-white text-center mb-6 font-light">ลงทะเบียนพนักงานใหม่</h3>
                <div class="space-y-4">
                    <input type="text" id="regName" class="input-dark w-full p-4 rounded-xl text-sm" placeholder="ชื่อ-นามสกุลจริง">
                    <input type="text" id="regPhone" class="input-dark w-full p-4 rounded-xl text-sm" placeholder="เบอร์โทรศัพท์">
                    <button onclick="requestGPS()" id="gpsBtn" class="w-full py-3 border border-[#0B47AF] text-[#0B47AF] rounded-xl text-xs font-medium">📍 แตะเพื่อยืนยันพิกัดสมัครงาน</button>
                    <button onclick="submitRegistration()" class="w-full py-4 bg-[#0B47AF] text-white rounded-xl font-bold mt-4 shadow-lg">ยืนยันการสมัคร</button>
                </div>
            </div>

            <div id="panel-staff" class="state-panel w-full">
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="handleCheckInOut()" id="checkBtn" class="w-full py-5 bg-[#12CF35] text-[#121212] rounded-2xl font-bold text-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
                        <span id="checkIcon">🌅</span>
                        <span id="checkText">เข้างาน (Check In)</span>
                    </button>
                </div>
            </div>

            <div id="panel-cashier" class="state-panel w-full">
                <div class="space-y-4">
                    <button onclick="handleCheckInOut()" id="cashierCheckBtn" class="w-full py-4 bg-[#12CF35] text-[#121212] rounded-xl font-bold flex items-center justify-center gap-2">
                        <span>🌅</span> <span id="cashierCheckText">Check In/Out</span>
                    </button>
                    <div class="h-[1px] bg-gray-700 w-full my-2"></div>
                    <button onclick="openCashierModal()" class="w-full py-4 bg-transparent border-2 border-[#0B47AF] text-[#0B47AF] rounded-xl font-bold text-sm tracking-wide">
                        🛍️ คีย์ยอดปิดร้านประจำวัน
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div class="w-full text-center mt-12 mb-4">
        <p class="text-[10px] text-gray-400 font-light uppercase tracking-[0.2em]">Deli Daily Operational System</p>
    </div>

    <div id="cashierModal" class="fixed inset-0 bg-black/90 z-40 hidden flex items-center justify-center p-6">
        <div class="onyx-board bg-[#1E1E1E] w-full max-w-sm rounded-3xl p-8 border border-gray-800">
            <h3 class="text-white text-lg font-bold mb-6 flex items-center gap-2">
                <span class="text-2xl">📊</span> รายงานยอดขายประจำวัน
            </h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="sale-grab" class="input-dark p-4 rounded-xl text-center" placeholder="Grab">
                    <input type="number" id="sale-lineman" class="input-dark p-4 rounded-xl text-center" placeholder="LINE MAN">
                    <input type="number" id="sale-shopee" class="input-dark p-4 rounded-xl text-center" placeholder="Shopee">
                    <input type="number" id="sale-walkin" class="input-dark p-4 rounded-xl text-center" placeholder="หน้าร้าน">
                </div>
                <input type="number" id="sale-customer" class="input-dark w-full p-4 rounded-xl text-center" placeholder="จำนวนหัวลูกค้า (Pax)">
                <div class="flex gap-3 mt-6">
                    <button onclick="closeCashierModal()" class="flex-1 py-4 text-gray-500 font-medium">ยกเลิก</button>
                    <button onclick="submitCashierSales()" class="flex-[2] py-4 bg-[#12CF35] text-black font-bold rounded-xl shadow-lg shadow-green-900/20">ส่งยอดปิดร้าน</button>
                </div>
            </div>
        </div>
    </div>

    <div id="successOverlay" class="fixed inset-0 flex flex-col items-center justify-center text-white">
        <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(255,255,255,0.3)] animate-bounce">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold uppercase tracking-widest">Completed</h2>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "2010194217-UacuyfmZ",
            API_URL: "https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B"
        };

        let userState = {
            role: 'unregistered', // unregistered, staff, cashier
            isCheckIn: false,
            lat: null, lng: null,
            userId: '', name: ''
        };

        async function initLiff() {
            try {
                await liff.init({ liffId: CONFIG.LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    const p = await liff.getProfile();
                    userState.userId = p.userId;
                    userState.name = p.displayName;
                    document.getElementById('userImg').src = p.pictureUrl;
                    document.getElementById('userName').innerText = p.displayName;
                    document.getElementById('profileSection').classList.remove('hidden');
                    
                    // Fetch User Role from n8n
                    checkUserStatus();
                }
            } catch (err) { console.error(err); }
        }

        async function checkUserStatus() {
            // จำลองการเรียก API เพื่อเช็คสถานะพนักงาน
            // ในงานจริง: fetch(CONFIG.API_URL + '?action=checkStatus&userId=' + userState.userId)
            // ตัวอย่าง: ถ้าเป็นพนักงานลงทะเบียนแล้ว
            const mockRole = 'cashier'; // เปลี่ยนเป็น 'unregistered' หรือ 'staff' เพื่อทดสอบ UI
            userState.role = mockRole;
            renderUI();
        }

        function renderUI() {
            document.querySelectorAll('.state-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${userState.role}`).classList.add('active');
            
            const roleTexts = { unregistered: 'New Applicant', staff: 'Active Staff', cashier: 'Head Cashier' };
            document.getElementById('userRole').innerText = roleTexts[userState.role];

            // Update Check In/Out Text
            const text = userState.isCheckIn ? 'ออกงาน (Check Out)' : 'เข้างาน (Check In)';
            const icon = userState.isCheckIn ? '🏠' : '🌅';
            if(document.getElementById('checkText')) document.getElementById('checkText').innerText = text;
            if(document.getElementById('checkIcon')) document.getElementById('checkIcon').innerText = icon;
        }

        function requestGPS() {
            navigator.geolocation.getCurrentPosition((pos) => {
                userState.lat = pos.coords.latitude;
                userState.lng = pos.coords.longitude;
                const btn = document.getElementById('gpsBtn');
                btn.innerText = "✅ พิกัดระบุตำแหน่งสำเร็จ";
                btn.classList.replace('text-[#0B47AF]', 'text-[#12CF35]');
                document.getElementById('gpsStatus').classList.replace('bg-gray-500', 'bg-[#12CF35]');
            }, (err) => alert('กรุณาเปิด GPS'));
        }

        async function submitAction(payload) {
            try {
                const res = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...payload, userId: userState.userId, name: userState.name })
                });
                if (res.ok) {
                    document.getElementById('successOverlay').style.display = 'flex';
                    setTimeout(() => liff.closeWindow(), 1500);
                }
            } catch (err) { alert('การเชื่อมต่อขัดข้อง'); }
        }

        function handleCheckInOut() {
            const action = userState.isCheckIn ? 'CHECK_OUT' : 'CHECK_IN';
            submitAction({ type: action, lat: userState.lat, lng: userState.lng });
        }

        function openCashierModal() { document.getElementById('cashierModal').classList.remove('hidden'); }
        function closeCashierModal() { document.getElementById('cashierModal').classList.add('hidden'); }

        function submitCashierSales() {
            const sales = {
                grab: document.getElementById('sale-grab').value,
                lineman: document.getElementById('sale-lineman').value,
                shopee: document.getElementById('sale-shopee').value,
                walkin: document.getElementById('sale-walkin').value,
                pax: document.getElementById('sale-customer').value,
                type: 'CLOSE_SHIFT'
            };
            submitAction(sales);
        }

        window.onload = initLiff;
    </script>
</body>
</html>
