<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAFF CARD | Deli Daily OS</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #F9F9F9; color: #2A2A2A; }
        .graphite-board { background-color: #2A2A2A; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .onyx-input { background-color: #1E1E1E; border: 1px solid #3A3A3A; color: white; }
        .onyx-input:focus { border-color: #0B47AF; outline: none; box-shadow: 0 0 10px rgba(11, 71, 175, 0.3); }
        .state-panel { display: none; }
        .state-panel.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .success-overlay { background-color: #12CF35; display: none; z-index: 100; }
        .efficiency-bar { height: 8px; border-radius: 4px; background: #3A3A3A; overflow: hidden; position: relative; }
        .efficiency-fill { height: 100%; transition: width 1s ease-in-out; }
        .badge-glow { filter: drop-shadow(0 0 5px rgba(11, 71, 175, 0.6)); }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6 overflow-x-hidden">

    <div class="w-full text-left mb-8 px-2">
        <p class="text-[10px] tracking-[0.2em] text-gray-400 uppercase leading-none">Deli Daily</p>
        <h1 class="text-3xl font-bold text-[#0B47AF] leading-none mt-1">STAFF CARD</h1>
    </div>

    <div class="flex-grow flex items-center justify-center">
        <div class="graphite-board w-full max-w-sm p-8 flex flex-col items-center relative">
            
            <div class="flex flex-col items-center mb-8">
                <div class="relative mb-4">
                    <img id="userImg" src="https://placehold.co/150/2a2a2a/white?text=..." class="w-24 h-24 rounded-full border-2 border-[#0B47AF] p-1 object-cover">
                    <div id="gpsIndicator" class="absolute -bottom-1 -right-1 bg-gray-500 w-6 h-6 rounded-full border-4 border-[#2A2A2A] transition-colors"></div>
                </div>
                <h2 id="userName" class="text-white text-xl font-medium mb-0.5">Authenticating...</h2>
                <p id="userRole" class="text-[#B0B0B0] text-[10px] font-light uppercase tracking-[0.2em]">Active Employee</p>
            </div>

            <div id="panel-loading" class="state-panel active text-center py-10">
                <p class="text-[#0B47AF] text-sm animate-pulse italic">กำลังสื่อสารกับยานแม่...</p>
            </div>

            <div id="panel-main" class="state-panel w-full">
                <button id="actionBtn" onclick="handleTimeRecord()" class="w-full py-5 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span id="actionIcon">🌅</span>
                    <span id="actionText">เข้างาน (Check-in)</span>
                </button>
                <p id="gpsLabel" class="text-[9px] text-gray-500 text-center mt-3 font-mono">GPS: Seeking Satellite...</p>
            </div>

            <div id="empowerment-section" class="w-full mt-10 pt-8 border-t border-gray-700 hidden">
                <div class="mb-6">
                    <div class="flex justify-between text-[10px] text-gray-400 mb-2">
                        <span>ทีมเวิร์กวันนี้ (Efficiency)</span>
                        <span id="effValue" class="text-white font-bold">84%</span>
                    </div>
                    <div class="efficiency-bar">
                        <div id="effFill" class="efficiency-fill bg-[#12CF35]" style="width: 0%"></div>
                    </div>
                    <p class="text-[9px] text-gray-500 mt-2 italic text-center">*มาตรฐานร้าน 80%</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#1E1E1E] p-3 rounded-xl border border-gray-800 flex flex-col items-center">
                        <span class="text-xl mb-1 badge-glow">🛡️</span>
                        <span class="text-[9px] text-gray-500 uppercase">Current Badge</span>
                        <span id="badgeName" class="text-white text-[10px] font-medium">Base Keeper</span>
                    </div>
                    <div class="bg-[#1E1E1E] p-3 rounded-xl border border-gray-800 flex flex-col items-center">
                        <span class="text-xl mb-1 text-[#12CF35]">💰</span>
                        <span class="text-[9px] text-gray-500 uppercase">Tip Projection</span>
                        <span id="tipValue" class="text-white text-[10px] font-medium">฿1,250</span>
                    </div>
                </div>
            </div>

            <div id="cashier-access" class="w-full mt-6 hidden">
                <button onclick="toggleSalesForm()" class="w-full py-3 bg-transparent border border-[#0B47AF] text-[#0B47AF] rounded-xl text-xs font-medium hover:bg-[#0B47AF]/10 transition-colors">
                    🛍️ คีย์ยอดปิดร้านประจำวัน
                </button>
            </div>

        </div>
    </div>

    <div id="salesModal" class="fixed inset-0 bg-black/90 z-40 hidden flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-[#1E1E1E] rounded-3xl p-8 border border-gray-800">
            <h3 class="text-white text-lg font-bold mb-6 flex items-center gap-2 text-left uppercase">
                <span class="text-xl">📊</span> DAILY SALES REPORT
            </h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="sale-transfer" class="onyx-input p-4 rounded-xl text-center" placeholder="โอน">
                <input type="number" id="sale-cash" class="onyx-input p-4 rounded-xl text-center" placeholder="เงินสด">
                <input type="number" id="sale-grab" class="onyx-input p-4 rounded-xl text-center" placeholder="Grab">
                <input type="number" id="sale-lineman" class="onyx-input p-4 rounded-xl text-center" placeholder="LINE MAN">
                <input type="number" id="sale-shopee" class="onyx-input p-4 rounded-xl text-center" placeholder="Shopee">
                <input type="number" id="sale-pax" class="onyx-input p-4 rounded-xl text-center col-span-2" placeholder="จำนวนหัวลูกค้า (Pax)">
            </div>
            <div class="flex gap-4">
                <button onclick="toggleSalesForm()" class="flex-1 py-4 text-gray-500 font-medium text-sm">ยกเลิก</button>
                <button onclick="submitSales()" class="flex-[2] py-4 bg-[#12CF35] text-black font-bold rounded-xl shadow-lg shadow-green-900/20 active:scale-95 transition-transform">ส่งข้อมูลปิดร้าน</button>
            </div>
        </div>
    </div>

    <div id="successOverlay" class="success-overlay fixed inset-0 flex flex-col items-center justify-center text-white">
        <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mb-6 shadow-xl animate-bounce">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold tracking-widest">SUCCESS</h2>
    </div>

    <div class="w-full text-center mt-10">
        <p class="text-[10px] text-gray-300 font-light uppercase tracking-[0.2em]">Powered by Deli Daily Operational System</p>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "YOUR_LIFF_ID", // ใส่ LIFF ID ของคุณ
            WEBHOOK: "https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B"
        };

        let userData = { userId: '', name: '', role: '', isCheckIn: false, lat: null, lng: null };

        async function initLiff() {
            try {
                await liff.init({ liffId: CONFIG.LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    const p = await liff.getProfile();
                    userData.userId = p.userId;
                    userData.name = p.displayName;
                    document.getElementById('userImg').src = p.pictureUrl;
                    document.getElementById('userName').innerText = p.displayName;
                    getGPS();
                    fetchUserStatus();
                }
            } catch (err) { console.error(err); }
        }

        function getGPS() {
            navigator.geolocation.getCurrentPosition((pos) => {
                userData.lat = pos.coords.latitude;
                userData.lng = pos.coords.longitude;
                document.getElementById('gpsIndicator').classList.replace('bg-gray-500', 'bg-[#12CF35]');
                document.getElementById('gpsLabel').innerText = `FIXED: ${userData.lat.toFixed(5)}, ${userData.lng.toFixed(5)}`;
            }, (err) => {
                document.getElementById('gpsLabel').innerText = "ERROR: GPS DENIED";
                document.getElementById('gpsIndicator').classList.replace('bg-gray-500', 'bg-red-500');
            }, { enableHighAccuracy: true });
        }

        async function fetchUserStatus() {
            try {
                const res = await fetch(CONFIG.WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'STATUS_CHECK', userId: userData.userId })
                });
                const data = await res.json();
                
                userData.role = data.role; // 'staff' หรือ 'cashier'
                userData.isCheckIn = data.isCheckIn;
                
                renderState(data);
            } catch (err) { console.error("Fetch Status Error:", err); }
        }

        function renderState(data) {
            document.getElementById('panel-loading').classList.remove('active');
            document.getElementById('panel-main').classList.add('active');
            
            // Render Action Button
            const btn = document.getElementById('actionBtn');
            const icon = document.getElementById('actionIcon');
            const text = document.getElementById('actionText');

            if (userData.isCheckIn) {
                btn.className = "w-full py-5 rounded-2xl font-bold text-lg bg-[#0B47AF] text-white";
                icon.innerText = "🏠";
                text.innerText = "ออกงาน (Check-out)";
            } else {
                btn.className = "w-full py-5 rounded-2xl font-bold text-lg bg-[#12CF35] text-black shadow-[#12CF35]/20";
                icon.innerText = "🌅";
                text.innerText = "เข้างาน (Check-in)";
            }

            // Role specific UI
            if (userData.role === 'cashier') {
                document.getElementById('cashier-access').classList.remove('hidden');
            }

            // Empowerment Dashboard
            if (data.empowerment) {
                document.getElementById('empowerment-section').classList.remove('hidden');
                document.getElementById('effValue').innerText = data.empowerment.efficiency + '%';
                document.getElementById('effFill').style.width = data.empowerment.efficiency + '%';
                document.getElementById('badgeName').innerText = data.empowerment.badge;
                document.getElementById('tipValue').innerText = '฿' + data.empowerment.tip;
            }
        }

        async function handleTimeRecord() {
            if (!userData.lat) { alert("กรุณารอสัญญาณพิกัด GPS..."); return; }
            const type = userData.isCheckIn ? 'CHECK_OUT' : 'CHECK_IN';
            dispatch({ type, lat: userData.lat, lng: userData.lng });
        }

        function toggleSalesForm() {
            const modal = document.getElementById('salesModal');
            modal.classList.toggle('hidden');
        }

        async function submitSales() {
            const sales = {
                type: 'SALES_REPORT',
                transfer: document.getElementById('sale-transfer').value,
                cash: document.getElementById('sale-cash').value,
                grab: document.getElementById('sale-grab').value,
                lineman: document.getElementById('sale-lineman').value,
                shopee: document.getElementById('sale-shopee').value,
                pax: document.getElementById('sale-pax').value
            };
            dispatch(sales);
        }

        async function dispatch(payload) {
            try {
                const res = await fetch(CONFIG.WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...payload, userId: userData.userId, name: userData.name })
                });

                if (res.ok) {
                    document.getElementById('successOverlay').style.display = 'flex';
                    setTimeout(() => { liff.closeWindow(); }, 1500);
                }
            } catch (err) { alert('การส่งข้อมูลขัดข้อง'); }
        }

        window.onload = initLiff;
    </script>
</body>
</html>
