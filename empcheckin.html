<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAFF Check-in | Deli Daily</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #F9F9F9; }
        .graphite-board { background-color: #2A2A2A; border-radius: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12); }
        .action-btn { background-color: #1E1E1E; border: 2px solid transparent; transition: all 0.2s; }
        .action-btn.active { border-color: #0B47AF; box-shadow: 0 0 15px rgba(11, 71, 175, 0.4); }
        #successOverlay { background-color: #12CF35; display: none; }
        #successOverlay.show { display: flex; z-index: 100; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6">

    <div class="w-full text-left mb-8 px-2">
        <p class="text-[10px] tracking-[0.1em] text-gray-400 uppercase leading-none">Deli Daily</p>
        <h1 class="text-3xl font-bold text-[#0B47AF] leading-none mt-1">STAFF</h1>
    </div>

    <div class="flex-grow flex items-center justify-center">
        <div class="graphite-board w-full max-w-sm p-8 flex flex-col items-center">
            
            <div class="relative mb-4">
                <img id="userImg" src="https://placehold.co/100/1e1e1e/white?text=..." class="w-20 h-20 rounded-full border-2 border-[#0B47AF] p-1 object-cover">
                <div id="gpsStatusIcon" class="absolute -bottom-1 -right-1 bg-gray-500 w-6 h-6 rounded-full border-2 border-[#2A2A2A] flex items-center justify-center text-[10px]">📡</div>
            </div>

            <h2 id="userName" class="text-white text-xl font-medium mb-0.5">Loading...</h2>
            <p class="text-[#B0B0B0] text-[9px] font-light uppercase tracking-[0.2em] mb-6">Active Staff</p>

            <div class="w-full bg-[#1E1E1E] rounded-xl p-4 mb-8 text-center border border-gray-800">
                <p id="statusMsg" class="text-[#0B47AF] text-[11px] font-medium animate-pulse mb-1">ตรวจสอบพิกัดความปลอดภัย...</p>
                <p id="coordsDisplay" class="text-[9px] text-gray-600 font-mono tracking-tighter"></p>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full mb-8">
                <button onclick="selectAction('CHECK_IN')" id="btnCheckIn" class="action-btn p-5 rounded-2xl flex flex-col items-center group">
                    <span class="text-2xl mb-1">🌅</span>
                    <span class="text-white text-[11px]">เข้างาน</span>
                </button>
                <button onclick="selectAction('CHECK_OUT')" id="btnCheckOut" class="action-btn p-5 rounded-2xl flex flex-col items-center group">
                    <span class="text-2xl mb-1">🏠</span>
                    <span class="text-white text-[11px]">ออกงาน</span>
                </button>
            </div>

            <button id="submitBtn" onclick="dispatchData()" disabled class="w-full py-4 bg-[#0B47AF] text-white rounded-xl font-semibold opacity-30 shadow-lg transition-all active:scale-95">
                ยืนยันการลงเวลา
            </button>
        </div>
    </div>

    <div class="w-full text-center mt-12">
        <p class="text-[10px] text-gray-300 font-light uppercase tracking-[0.2em]">Powered by Deli Daily Operational System</p>
    </div>

    <div id="successOverlay" class="fixed inset-0 flex-col items-center justify-center text-white">
        <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mb-4">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-xl font-bold">บันทึกสำเร็จ</h2>
    </div>

    <script>
        const CONFIG = {
            LIFF_ID: "2010194217-lnwYLoTq",
            WEBHOOK: "https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B"
        };

        let state = { lat: null, lng: null, action: null, userId: '', name: '' };

        async function initLiff() {
            try {
                await liff.init({ liffId: CONFIG.LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    const p = await liff.getProfile();
                    state.userId = p.userId;
                    state.name = p.displayName;
                    document.getElementById('userImg').src = p.pictureUrl;
                    document.getElementById('userName').innerText = p.displayName;
                    getGPS();
                }
            } catch (err) { console.error(err); }
        }

        function getGPS() {
            navigator.geolocation.getCurrentPosition((pos) => {
                state.lat = pos.coords.latitude;
                state.lng = pos.coords.longitude;
                
                const msg = document.getElementById('statusMsg');
                msg.innerText = "พิกัดระบุตำแหน่งสำเร็จ";
                msg.classList.remove('animate-pulse');
                msg.classList.add('text-[#12CF35]');
                
                // Display Lat/Lng
                document.getElementById('coordsDisplay').innerText = `${state.lat.toFixed(6)}, ${state.lng.toFixed(6)}`;
                document.getElementById('gpsStatusIcon').classList.add('bg-[#12CF35]');
                checkReady();
            }, (err) => {
                document.getElementById('statusMsg').innerText = "กรุณาเปิด GPS";
                document.getElementById('statusMsg').classList.add('text-red-500');
            }, { enableHighAccuracy: true });
        }

        function selectAction(type) {
            state.action = type;
            document.getElementById('btnCheckIn').classList.toggle('active', type === 'CHECK_IN');
            document.getElementById('btnCheckOut').classList.toggle('active', type === 'CHECK_OUT');
            checkReady();
        }

        function checkReady() {
            const btn = document.getElementById('submitBtn');
            if (state.lat && state.action) {
                btn.disabled = false;
                btn.classList.remove('opacity-30');
            }
        }

        async function dispatchData() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "กำลังส่งข้อมูล...";
            btn.disabled = true;

            const payload = {
                userId: state.userId,
                name: state.name,
                lat: state.lat,
                lng: state.lng,
                type: state.action,
                code: new URLSearchParams(window.location.search).get('code') || 'no_code'
            };

            try {
                const res = await fetch(CONFIG.WEBHOOK, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok || res.status === 200) {
                    document.getElementById('successOverlay').classList.add('show');
                    setTimeout(() => liff.closeWindow(), 1500);
                } else { throw new Error(); }
            } catch (err) {
                alert('การเชื่อมต่อขัดข้อง: โปรดลองใหม่อีกครั้ง');
                btn.innerText = "ยืนยันการลงเวลา";
                btn.disabled = false;
            }
        }

        window.onload = initLiff;
    </script>
</body>
</html>
