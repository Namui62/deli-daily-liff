<script>
    const MY_LIFF_ID = "2010194217-lnwYLoTq";
    const MY_N8N_URL = "https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B";

    async function main() {
        await liff.init({ liffId: MY_LIFF_ID });

        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }

        const profile = await liff.getProfile();

        document.getElementById("displayName").innerText = profile.displayName;
        document.getElementById("userId").innerText = profile.userId;

        checkPermission(profile.userId);
    }

    async function checkPermission(uid) {

        const log = document.getElementById("debugLog");

        try {

            log.innerText = "⏳ Checking permission...";

            const response = await fetch(MY_N8N_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "CHECK_PERMISSION",
                    userId: uid
                })
            });

            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }

            const data = await response.json();

            log.innerText =
                "✅ Raw Response:\n\n" +
                JSON.stringify(data, null, 2);

            // รองรับทั้ง Array และ Object
            const raw = Array.isArray(data)
                ? data[0]
                : data;

            // กัน undefined
            if (!raw) {
                throw new Error("Empty response from n8n");
            }

            // รองรับทั้งตัวใหญ่/เล็ก
            const role =
                raw.Role ||
                raw.role ||
                "Unknown";

            const branch =
                raw.Branch ||
                raw.branch ||
                "Unknown";

            // แสดงผลบน UI
            document.getElementById("displayRole").innerText = role;
            document.getElementById("displayShopName").innerText = branch;

            // เช็คสิทธิ์
            if (role.toLowerCase() === "cashier") {

                document.getElementById("formArea").style.display = "block";

                log.innerText +=
                    "\n\n✅ Permission Granted";

            } else {

                document.getElementById("formArea").style.display = "none";

                log.innerText +=
                    "\n\n❌ Permission Denied\nRole = " + role;
            }

        } catch (error) {

            log.innerText =
                "❌ ERROR\n\n" +
                error.message;

            console.error(error);
        }
    }

    async function sendData() {

        const transfer =
            document.getElementById("shopTransfer").value;

        const cash =
            document.getElementById("shopCash").value;

        alert(
            "ส่งข้อมูลแล้ว\n\n" +
            "โอน: " + transfer +
            "\nสด: " + cash
        );

        // TODO:
        // ส่งข้อมูลไป n8n
    }

    main();
</script>
