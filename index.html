<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deli Daily - Closing Auditor</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* CSS เดิมของพี่สวยอยู่แล้วครับ */
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 15px; background-color: #1a1a1a; color: #fff; }
        .card { background: #2d2d2d; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 400px; margin: auto; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #00b900; margin-bottom: 10px; }
        .info-box { background: #3d3d3d; padding: 10px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; text-align: left; }
        .info-box p { margin: 5px 0; color: #ccc; }
        .info-box b { color: #00b900; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; margin-left: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 10px; font-size: 18px; background: #333; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00b900; }
        button { background: linear-gradient(90deg, #00b900, #009900); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
        .badge { background: #00b900; color: #000; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <img id="pictureUrl" class="profile-img" src="https://via.placeholder.com/70" alt="Profile">
        <h2 id="displayName" style="margin: 10px 0 5px 0; font-size: 22px;">กำลังยืนยันตัวตน...</h2>
        
        <div class="info-box">
            <p>ตำแหน่ง: <span id="displayRole" class="badge">ตรวจสอบสิทธิ์...</span></p>
            <p>ร้าน: <b id="displayShopName">กำลังโหลด...</b></p>
            <p>ID สาขา: <b id="displayBranchId">กำลังโหลด...</b></p>
            <p style="font-size: 11px; opacity: 0.6;">UID: <span id="userId">...</span></p>
        </div>

        <div id="formArea" style="display: none;">
            <hr>
            <p style="font-size: 16px; font-weight: bold; color: #00b900; margin-bottom: 15px;">สรุปยอดปิดร้านประจำวัน</p>
            <div class="form-group"><label>🏠 หน้าร้าน (เงินโอน)</label><input type="number" id="shopTransfer" placeholder="0.00" inputmode="decimal"></div>
            <div class="form-group"><label>💵 หน้าร้าน (เงินสด)</label><input type="number" id="shopCash" placeholder="0.00" inputmode="decimal"></div>
            <div class="form-group"><label>🛵 ยอด Grab (สุทธิ)</label><input type="number" id="grabNet" placeholder="0.00" inputmode="decimal"></div>
            <div class="form-group"><label>🧡 ยอด Shopee (สุทธิ)</label><input type="number" id="shopeeNet" placeholder="0.00" inputmode="decimal"></div>
            <div class="form-group"><label>💚 ยอด LINEMAN (สุทธิ)</label><input type="number" id="linemanNet" placeholder="0.00" inputmode="decimal"></div>
            <button id="submitBtn" onclick="sendData()">ยืนยันปิดยอดขาย</button>
        </div>

        <div id="errorArea" style="display: none; color: #ff4d4d; margin-top: 20px;">
            ⚠️ ขออภัย คุณไม่มีสิทธิ์เข้าถึงระบบปิดยอด
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "2010194217-lnwYLoTq"; 
        const MY_N8N_URL = "https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B";

        async function main() {
            await liff.init({ liffId: MY_LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById("displayName").innerText = profile.displayName;
                document.getElementById("userId").innerText = profile.userId;
                document.getElementById("pictureUrl").src = profile.pictureUrl;

                // ดึงข้อมูลสิทธิ์จาก n8n ทันที
                await checkPermission(profile.userId);
            } else {
                liff.login();
            }
        }

        // ตรงนี้คือจุดที่เช็คสิทธิ์ในหน้า LIFF ครับ
async function checkPermission(uid) {
    try {
        const response = await fetch(MY_N8N_URL, {
            method: "POST",
            body: JSON.stringify({ action: "CHECK_PERMISSION", userId: uid }),
            headers: { "Content-Type": "application/json" }
        });
        const userData = await response.json();

        // ⚠️ แก้ตรงนี้: ต้องใช้ Role (R ตัวใหญ่) ตามที่ n8n ส่งมา
        if (userData && userData.Role === if (userData)) { 
            document.getElementById("displayRole").innerText = userData.Role;
            document.getElementById("displayShopName").innerText = userData.Branch; // B ตัวใหญ่
            document.getElementById("displayBranchId").innerText = userData.Branch; // B ตัวใหญ่
            document.getElementById("formArea").style.display = "block";
            document.getElementById("displayName").innerText = "เข้าใช้งานได้";
        } else {
            // ถ้าหลุดมาตรงนี้ แสดงว่าค่า Role ที่ได้มาไม่ใช่ 'Cashier' หรือตัวแปรชื่อไม่ตรง
            document.getElementById("displayRole").innerText = "ไม่มีสิทธิ์";
            document.getElementById("errorArea").style.display = "block";
            document.getElementById("formArea").style.display = "none";
        }
    } catch (e) {
        console.error("Permission check failed", e);
    }
}

        async function sendData() {
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            const transfer = document.getElementById("shopTransfer").value || 0;
            const cash = document.getElementById("shopCash").value || 0;
            const grab = document.getElementById("grabNet").value || 0;
            const shopee = document.getElementById("shopeeNet").value || 0;
            const lineman = document.getElementById("linemanNet").value || 0;

            const profile = await liff.getProfile();
            const shop = document.getElementById("displayShopName").innerText;
            const branch = document.getElementById("displayBranchId").innerText;

            const data = {
                action: "RECORD_SALES_CLOSING",
                userId: profile.userId,
                displayName: profile.displayName,
                shop: shop,
                branch: branch,
                shop_transfer: parseFloat(transfer),
                shop_cash: parseFloat(cash),
                grab_net: parseFloat(grab),
                shopee_net: parseFloat(shopee),
                lineman_net: parseFloat(lineman),
                total_sales: parseFloat(transfer) + parseFloat(cash) + parseFloat(grab) + parseFloat(shopee) + parseFloat(lineman)
            };

            await fetch(MY_N8N_URL, {
                method: "POST",
                body: JSON.stringify(data),
                headers: { "Content-Type": "application/json" }
            });
            alert("บันทึกยอดสำเร็จ!");
            liff.closeWindow();
        }
        main();
    </script>
</body>
</html>
