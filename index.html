<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deli Daily - Closing Auditor</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 15px; background-color: #1a1a1a; color: #fff; }
        .card { background: #2d2d2d; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 400px; margin: auto; text-align: center; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #00b900; margin-bottom: 10px; }
        .info-box { background: #3d3d3d; padding: 15px; border-radius: 12px; margin: 15px 0; text-align: left; font-size: 14px; }
        .info-box p { margin: 5px 0; color: #ccc; }
        .info-box b { color: #00b900; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; margin-left: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 10px; font-size: 18px; background: #333; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00b900; }
        button { background: linear-gradient(90deg, #00b900, #009900); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
        .badge { background: #00b900; color: #000; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; vertical-align: middle; }
        #errorArea { display: none; color: #ff4d4d; margin-top: 20px; font-weight: bold; border: 1px solid #ff4d4d; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <img id="pictureUrl" class="profile-img" src="https://via.placeholder.com/70" alt="Profile">
        <h2 id="displayName" style="margin: 10px 0 5px 0; font-size: 22px;">Loading...</h2>
        
        <div class="info-box">
            <p>ตำแหน่ง: <span id="displayRole" class="badge">Checking...</span></p>
            <p>ID สาขา: <b id="displayBranchId">...</b></p>
            <p style="font-size: 11px; opacity: 0.6;">UID: <span id="userId">...</span></p>
        </div>

        <div id="formArea" style="display: none;">
            <hr>
            <p style="font-size: 16px; font-weight: bold; color: #00b900; margin-bottom: 15px;">สรุปยอดปิดร้านประจำวัน</p>
            <div class="form-group"><label>🏠 หน้าร้าน (เงินโอน)</label><input type="number" id="shopTransfer" value="0" inputmode="decimal"></div>
            <div class="form-group"><label>💵 หน้าร้าน (เงินสด)</label><input type="number" id="shopCash" value="0" inputmode="decimal"></div>
            <div class="form-group"><label>🛵 ยอด Grab (สุทธิ)</label><input type="number" id="grabNet" value="0" inputmode="decimal"></div>
            <div class="form-group"><label>🧡 ยอด Shopee (สุทธิ)</label><input type="number" id="shopeeNet" value="0" inputmode="decimal"></div>
            <div class="form-group"><label>💚 ยอด LINEMAN (สุทธิ)</label><input type="number" id="linemanNet" value="0" inputmode="decimal"></div>
            <button id="submitBtn" onclick="sendData()">ยืนยันปิดยอดขาย</button>
        </div>

        <div id="errorArea"></div>
    </div>

    <script>
        const MY_LIFF_ID = "2010194217-lnwYLoTq"; 
        const MY_N8N_URL = "https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B";

        async function main() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                document.getElementById("displayName").innerText = profile.displayName;
                document.getElementById("userId").innerText = profile.userId;
                document.getElementById("pictureUrl").src = profile.pictureUrl;

                await checkPermission(profile.userId);
            } catch (err) {
                console.error(err);
            }
        }

        async function checkPermission(uid) {
            try {
                const response = await fetch(MY_N8N_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "CHECK_PERMISSION", userId: uid })
                });

                const data = await response.json();
                const user = Array.isArray(data) ? data[0] : data;

                if (user) {
                    // ดึงค่า Role และ Branch พร้อมลบเครื่องหมาย = ออกให้อัตโนมัติ
                    let role = (user.Role || user.role || "Unknown").toString().replace(/^=/, '');
                    let branch = (user.Branch || user.branch || "Unknown").toString().replace(/^=/, '');

                    document.getElementById("displayRole").innerText = role;
                    document.getElementById("displayBranchId").innerText = branch;

                    if (role.toLowerCase() === "cashier") {
                        document.getElementById("formArea").style.display = "block";
                    } else {
                        showError("⚠️ คุณไม่มีสิทธิ์เข้าถึง (Role: " + role + ")");
                    }
                }
            } catch (err) {
                showError("⚠️ ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
            }
        }

        async function sendData() {
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            try {
                const profile = await liff.getProfile();
                const payload = {
                    action: "RECORD_SALES_CLOSING",
                    userId: profile.userId,
                    displayName: profile.displayName,
                    branch: document.getElementById("displayBranchId").innerText,
                    shop_transfer: parseFloat(document.getElementById("shopTransfer").value) || 0,
                    shop_cash: parseFloat(document.getElementById("shopCash").value) || 0,
                    grab_net: parseFloat(document.getElementById("grabNet").value) || 0,
                    shopee_net: parseFloat(document.getElementById("shopeeNet").value) || 0,
                    lineman_net: parseFloat(document.getElementById("linemanNet").value) || 0
                };

                const response = await fetch(MY_N8N_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ บันทึกยอดสำเร็จ!");
                    liff.closeWindow();
                } else {
                    throw new Error("Save Failed");
                }
            } catch (err) {
                alert("❌ เกิดข้อผิดพลาดในการบันทึก");
                btn.disabled = false;
                btn.innerText = "ยืนยันปิดยอดขาย";
            }
        }

        function showError(msg) {
            const errDiv = document.getElementById("errorArea");
            errDiv.innerHTML = msg;
            errDiv.style.display = "block";
            document.getElementById("displayRole").innerText = "Denied";
        }

        main();
    </script>
</body>
</html>
