<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deli Daily Input</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        img { width: 80px; border-radius: 50%; margin-bottom: 10px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; }
        button { background-color: #00b900; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img id="pictureUrl" src="https://via.placeholder.com/80" alt="Profile">
        <h2 id="displayName">กำลังโหลด...</h2>
        <p style="font-size: 12px; color: #888;">ID: <span id="userId">...</span></p>
        <hr>
        <p><b>กรอกยอดขายวันนี้ (บาท)</b></p>
        <input type="number" id="salesAmount" placeholder="0.00" inputmode="decimal">
        <button onclick="sendData()">บันทึกยอดขาย</button>
    </div>

    <script>
        // ใส่ข้อมูลจริงของพี่ตรงนี้
        const MY_LIFF_ID = "2010194217-lnwYLoTq"; // <--- เปลี่ยนเป็น LIFF ID ของพี่
        const MY_N8N_URL = "https://primary-production-25a4.up.railway.app/webhook-test/DDOS-Module-B"; // <--- เปลี่ยนเป็น Production URL

        async function main() {
            await liff.init({ liffId: MY_LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById("displayName").innerText = "สวัสดีคุณ " + profile.displayName;
                document.getElementById("userId").innerText = profile.userId;
                document.getElementById("pictureUrl").src = profile.pictureUrl;
            } else {
                liff.login();
            }
        }

        async function sendData() {
            const sales = document.getElementById("salesAmount").value;
            if (!sales) { alert("กรุณากรอกยอดขายก่อนครับ"); return; }
            
            const profile = await liff.getProfile();
            const data = {
                action: "RECORD_SALES",
                userId: profile.userId,
                displayName: profile.displayName,
                sales: parseFloat(sales)
            };

            await fetch(MY_N8N_URL, {
                method: "POST",
                body: JSON.stringify(data),
                headers: { "Content-Type": "application/json" }
            });

            alert("บันทึกสำเร็จ! ขอบคุณครับ");
            liff.closeWindow();
        }
        main();
    </script>
</body>
</html>
