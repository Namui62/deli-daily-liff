<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration - Deli Daily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; }
        .input-focus:focus { border-color: #0b47af; box-shadow: 0 0 0 4px rgba(11, 71, 175, 0.1); }
        .peer:checked + .peer-checked-bg { background-color: #0b47af; color: white; border-color: #0b47af; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#0b47af] rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">ลงทะเบียนพนักงาน</h1>
            <p class="text-slate-500 text-sm">เข้าสู่ระบบเพื่อเชื่อมต่อข้อมูลร้าน</p>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-slate-50">
            <form id="staffForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1">ชื่อ-นามสกุล (ชื่อเล่น)</label>
                    <input type="text" id="empName" required placeholder="เช่น น้ามุย (มุย)" 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-slate-700 outline-none transition-all input-focus">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 ml-1">ตำแหน่งงาน</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="role" value="Cashier" class="peer sr-only" checked>
                            <div class="peer-checked-bg py-4 text-center border border-slate-100 bg-slate-50 rounded-2xl transition-all shadow-sm">
                                <span class="block text-sm font-semibold">Cashier</span>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="role" value="Staff" class="peer sr-only">
                            <div class="peer-checked-bg py-4 text-center border border-slate-100 bg-slate-50 rounded-2xl transition-all shadow-sm">
                                <span class="block text-sm font-semibold">Staff</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100 flex items-start gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#0b47af] mt-0.5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                    <p class="text-[11px] text-[#0b47af] leading-relaxed">
                        ระบบจะเชื่อมโยง LINE ID ของคุณเข้ากับโครงสร้างร้านอัตโนมัติ เพื่อความแม่นยำในการส่งยอด
                    </p>
                </div>

                <button type="submit" id="btnSubmit"
                    class="w-full bg-[#0b47af] text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-[#0788e4] transition-all transform active:scale-95 flex items-center justify-center gap-2">
                    <span>ส่งคำขอลงทะเบียน</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </form>
        </div>
        <p class="mt-8 text-center text-slate-400 text-[10px] uppercase tracking-[0.2em]">Digital Infrastructure by Deli Daily</p>
    </div>

    <script>
        async function main() {
            await liff.init({ liffId: "2010194217-lnwYLoTq" });
            if (!liff.isLoggedIn()) liff.login();
        }
        main();

        document.getElementById('staffForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "กำลังประมวลผล...";

            try {
                const profile = await liff.getProfile();
                const formData = {
                    empName: document.getElementById('empName').value,
                    role: document.querySelector('input[name="role"]:checked').value,
                    lineUserId: profile.userId,
                    lineDisplayName: profile.displayName
                };

                const response = await fetch('https://primary-production-25a4.up.railway.app/webhook/DDOS-Module-B', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('ส่งคำขอสำเร็จ! กรุณาแจ้งเจ้าของร้านเพื่ออนุมัติ');
                    liff.closeWindow();
                }
            } catch (err) {
                alert('เกิดข้อผิดพลาด');
                btn.disabled = false;
                btn.innerText = "ส่งคำขอลงทะเบียน";
            }
        });
    </script>
</body>
</html>
